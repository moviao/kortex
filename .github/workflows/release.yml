name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── Build Uber-JAR ─────────────────────────────
      - name: Build Uber-JAR
        run: ./gradlew build -Dquarkus.package.jar.type=uber-jar

      # ── Build Docker Image ─────────────────────────
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/moviao/kortex:${{ github.ref_name }}
            ghcr.io/moviao/kortex:latest

      # ── Create GitHub Release ──────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*-runner.jar
          body: |
            ## Kortex ${{ github.ref_name }}

### Quick Start (Docker — recommended)
#  ```bash
#  git clone https://github.com/moviao/kortex.git
#  cd kortex
#  docker compose up -d
#  ```

### Quick Start (JAR — requires JDK 21)
#  ```bash
#  java -jar kortex-*-runner.jar
#  ```

### Docker Image
#  ```bash
#  docker pull ghcr.io/moviao/kortex:${{ github.ref_name }}
#  ```