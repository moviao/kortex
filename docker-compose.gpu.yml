# Overlay for NVIDIA GPU — usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    environment:
      LLAMA_ARG_N_GPU_LAYERS: "999"
      NVIDIA_VISIBLE_DEVICES: "all"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]