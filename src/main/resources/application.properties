# ?? llama.cpp Connection ??????????????????????????????????????
llamacpp.base-url=${LLAMACPP_BASE_URL:http://localhost:8081}
llamacpp.timeout=${LLAMACPP_TIMEOUT:120}
llamacpp.models-dir=${MODELS_DIR:./models}

# ?? Server ????????????????????????????????????????????????????
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# ?? OpenAPI / Swagger ?????????????????????????????????????????
quarkus.smallrye-openapi.info-title=LLM REST Server
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Lightweight REST gateway for local LLMs via llama.cpp
quarkus.swagger-ui.always-include=true

# ?? Health ????????????????????????????????????????????????????
quarkus.health.extensions.enabled=true

# ?? Logging ???????????????????????????????????????????????????
quarkus.log.level=INFO
quarkus.log.category."com.moviao.kortex".level=DEBUG

quarkus.package.jar.type=uber-jar